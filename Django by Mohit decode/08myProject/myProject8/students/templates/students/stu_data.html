<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Data</h1>
    <h1><a href="{% url "stu_selected"  %}"><button>View Selected Students</button></a></h1>
    <ul>
        {% for student in stu_data %}
            <li>{{ student.name }},  {{ student.roll_no }}, 

            </li> <a href="{% url "stu_details" student.id%}"><button>More Details</button></a>
            <br>
            <br>
            {% comment %} <a href="{% url "stu_review" student.id%}"><button>Review</button></a> {% endcomment %}
            <br>
             
           
            
            <hr>
        {% endfor %}
    </ul>
</body>
</html>
