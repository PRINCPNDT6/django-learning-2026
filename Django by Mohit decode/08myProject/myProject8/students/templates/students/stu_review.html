<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Review</h1>
    <p>Name: {{ review.student.name }}</p>
    <p>Roll No: {{ review.student.roll_no }}</p>
    {% comment %} <p>Feedback: {{ review.feedback}}</p> {% endcomment %}
    <p>Review Text: {{ review.review_text }}</p>
    <p>Rating: {{ review.rating }}</p>
</body>
</html>
